spring.application.name=noura-commerce
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/noura_commerce_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=${APP_JPA_DDL_AUTO:validate}
spring.jpa.show-sql=${APP_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${APP_JPA_FORMAT_SQL:false}

spring.thymeleaf.cache=${APP_THYMELEAF_CACHE:true}

server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never

# Multipart uploads
server.tomcat.max-part-count=200
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB

# Currency settings
app.currency.base=USD
app.currency.base-name=US Dollar
app.currency.base-symbol=$
app.currency.base-decimals=2

# Live FX endpoint that returns a JSON object with a "rates" map keyed by currency code.
# Free open endpoint (no key): https://open.er-api.com/v6/latest/{base}
# Note: Open endpoint updates once per day and is rate-limited.
app.currency.rate-url=https://open.er-api.com/v6/latest/{base}
app.currency.rate-path=rates
# Refresh cadence (ms). Adjust to respect provider limits (open endpoint recommends >=1 hour).
app.currency.refresh-ms=3600000
app.currency.refresh-initial-ms=5000

# Shift management
app.shift.variance-threshold=20.00

# Pagination / infinite feed
app.pagination.cursor-secret=${APP_PAGINATION_CURSOR_SECRET:change-me-in-prod}
app.pagination.feed.rate-limit-per-minute=240

# Auth
app.auth.sso.enabled=${APP_AUTH_SSO_ENABLED:false}
app.auth.sso.registration-id=${APP_AUTH_SSO_REGISTRATION_ID:corp}
app.auth.sso.auto-provision=${APP_AUTH_SSO_AUTO_PROVISION:true}
app.auth.sso.default-role=${APP_AUTH_SSO_DEFAULT_ROLE:CASHIER}
app.auth.sso.email-claim=${APP_AUTH_SSO_EMAIL_CLAIM:email}
app.auth.sso.username-claim=${APP_AUTH_SSO_USERNAME_CLAIM:preferred_username}
app.auth.sso.demo.enabled=${APP_AUTH_SSO_DEMO_ENABLED:false}
app.auth.sso.demo.client-id=${APP_AUTH_SSO_DEMO_CLIENT_ID:}
app.auth.sso.demo.client-secret=${APP_AUTH_SSO_DEMO_CLIENT_SECRET:}
app.auth.sso.demo.user-sub=${APP_AUTH_SSO_DEMO_USER_SUB:}
app.auth.sso.demo.user-email=${APP_AUTH_SSO_DEMO_USER_EMAIL:}
app.auth.sso.demo.user-username=${APP_AUTH_SSO_DEMO_USER_USERNAME:}
app.auth.sso.demo.user-name=${APP_AUTH_SSO_DEMO_USER_NAME:}

# SSO provider wiring. Defaults target the built-in local demo endpoints.
# Override SSO_* environment values to use an external identity provider.
spring.security.oauth2.client.registration.corp.client-id=${SSO_CLIENT_ID:demo-client}
spring.security.oauth2.client.registration.corp.client-secret=${SSO_CLIENT_SECRET:demo-secret}
spring.security.oauth2.client.registration.corp.scope=${SSO_SCOPES:profile,email}
spring.security.oauth2.client.registration.corp.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.corp.client-authentication-method=client_secret_post
spring.security.oauth2.client.registration.corp.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.corp.client-name=${SSO_CLIENT_NAME:Corporate SSO}
spring.security.oauth2.client.provider.corp.authorization-uri=${SSO_AUTHORIZATION_URI:http://localhost:${server.port:8080}/dev-sso/authorize}
spring.security.oauth2.client.provider.corp.token-uri=${SSO_TOKEN_URI:http://localhost:${server.port:8080}/dev-sso/token}
spring.security.oauth2.client.provider.corp.user-info-uri=${SSO_USERINFO_URI:http://localhost:${server.port:8080}/dev-sso/userinfo}
spring.security.oauth2.client.provider.corp.user-name-attribute=${SSO_USER_NAME_ATTRIBUTE:sub}

app.security.remember-me.key=${APP_SECURITY_REMEMBER_ME_KEY:dev-remember-me-key-change-me}
app.security.login.max-failed-attempts=5
app.security.login.lock-duration-minutes=15
app.security.totp.node-command=node
app.security.totp.script-path=scripts/dev/speakeasy-totp.js
app.security.totp.issuer=DevCore POS
app.security.totp.verify-window=2
app.security.jwt.secret=${APP_SECURITY_JWT_SECRET:dev-jwt-secret-change-me-1234567890123456}
app.security.jwt.access-token-minutes=720
app.security.jwt.challenge-token-minutes=30
app.security.jwt.allowed-clock-skew-seconds=60
app.api.cors.allowed-origins=${APP_API_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:3000,http://127.0.0.1:3000,http://localhost:3001,http://127.0.0.1:3001}
app.uom.product-units.enabled=${APP_UOM_PRODUCT_UNITS_ENABLED:true}
app.uom.product-units.global-barcode-unique=${APP_UOM_GLOBAL_BARCODE_UNIQUE:false}

# Notifications
app.notifications.email.enabled=${APP_NOTIFICATIONS_EMAIL_ENABLED:false}
app.notifications.email.from-address=${APP_NOTIFICATIONS_EMAIL_FROM:noreply@example.com}
app.notifications.email.from-name=${APP_NOTIFICATIONS_EMAIL_FROM_NAME:POS System}

# SendGrid email provider
app.notifications.sendgrid.enabled=${APP_NOTIFICATIONS_SENDGRID_ENABLED:false}
app.notifications.sendgrid.api-key=${APP_NOTIFICATIONS_SENDGRID_API_KEY:}

# SMTP email provider (fallback)
app.notifications.smtp.enabled=${APP_NOTIFICATIONS_SMTP_ENABLED:false}
spring.mail.host=${APP_SMTP_HOST:smtp.gmail.com}
spring.mail.port=${APP_SMTP_PORT:587}
spring.mail.username=${APP_SMTP_USERNAME:}
spring.mail.password=${APP_SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Stripe payment gateway
app.payments.stripe.enabled=${APP_PAYMENTS_STRIPE_ENABLED:false}
app.payments.stripe.secret-key=${APP_PAYMENTS_STRIPE_SECRET_KEY:}
app.payments.stripe.publishable-key=${APP_PAYMENTS_STRIPE_PUBLISHABLE_KEY:}
app.payments.stripe.webhook-secret=${APP_PAYMENTS_STRIPE_WEBHOOK_SECRET:}

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.locations=classpath:db/migration

logging.level.org.thymeleaf=INFO
logging.level.org.attoparser=INFO

# ========================================
# Phase 4: Enterprise Features
# ========================================

# Shipping - FedEx
app.shipping.fedex.enabled=${APP_SHIPPING_FEDEX_ENABLED:false}
app.shipping.fedex.api-key=${APP_SHIPPING_FEDEX_API_KEY:}
app.shipping.fedex.secret-key=${APP_SHIPPING_FEDEX_SECRET_KEY:}
app.shipping.fedex.account-number=${APP_SHIPPING_FEDEX_ACCOUNT_NUMBER:}
app.shipping.fedex.sandbox=${APP_SHIPPING_FEDEX_SANDBOX:true}

# Shipping - UPS
app.shipping.ups.enabled=${APP_SHIPPING_UPS_ENABLED:false}
app.shipping.ups.client-id=${APP_SHIPPING_UPS_CLIENT_ID:}
app.shipping.ups.client-secret=${APP_SHIPPING_UPS_CLIENT_SECRET:}
app.shipping.ups.account-number=${APP_SHIPPING_UPS_ACCOUNT_NUMBER:}
app.shipping.ups.sandbox=${APP_SHIPPING_UPS_SANDBOX:true}

# Multi-Store
app.multistore.enabled=${APP_MULTISTORE_ENABLED:false}
app.multistore.default-store-code=${APP_MULTISTORE_DEFAULT_STORE_CODE:MAIN}

# B2B Commerce
app.b2b.enabled=${APP_B2B_ENABLED:false}
app.b2b.default-payment-terms-days=${APP_B2B_DEFAULT_PAYMENT_TERMS:30}
app.b2b.auto-approve-below=${APP_B2B_AUTO_APPROVE_BELOW:0}

# Marketplace Integration
app.marketplace.enabled=${APP_MARKETPLACE_ENABLED:false}
app.marketplace.order-sync-enabled=${APP_MARKETPLACE_ORDER_SYNC_ENABLED:true}
app.marketplace.inventory-sync-enabled=${APP_MARKETPLACE_INVENTORY_SYNC_ENABLED:true}

# Marketplace - Amazon SP-API
app.marketplace.amazon.refresh-token=${APP_MARKETPLACE_AMAZON_REFRESH_TOKEN:}
app.marketplace.amazon.client-id=${APP_MARKETPLACE_AMAZON_CLIENT_ID:}
app.marketplace.amazon.client-secret=${APP_MARKETPLACE_AMAZON_CLIENT_SECRET:}
app.marketplace.amazon.marketplace-id=${APP_MARKETPLACE_AMAZON_MARKETPLACE_ID:ATVPDKIKX0DER}

# Marketplace - eBay
app.marketplace.ebay.client-id=${APP_MARKETPLACE_EBAY_CLIENT_ID:}
app.marketplace.ebay.client-secret=${APP_MARKETPLACE_EBAY_CLIENT_SECRET:}
app.marketplace.ebay.refresh-token=${APP_MARKETPLACE_EBAY_REFRESH_TOKEN:}
app.marketplace.ebay.marketplace-id=${APP_MARKETPLACE_EBAY_MARKETPLACE_ID:EBAY_US}

# Marketplace - Shopify
app.marketplace.shopify.api-key=${APP_MARKETPLACE_SHOPIFY_API_KEY:}
app.marketplace.shopify.api-secret=${APP_MARKETPLACE_SHOPIFY_API_SECRET:}
app.marketplace.shopify.store-url=${APP_MARKETPLACE_SHOPIFY_STORE_URL:}
app.marketplace.shopify.access-token=${APP_MARKETPLACE_SHOPIFY_ACCESS_TOKEN:}

# Scheduled Jobs
app.scheduler.enabled=${APP_SCHEDULER_ENABLED:true}
app.scheduler.marketplace-order-sync-cron=${APP_SCHEDULER_MARKET_ORDER_SYNC:0 */15 * * * *}
app.scheduler.marketplace-inventory-sync-cron=${APP_SCHEDULER_MARKET_INV_SYNC:0 0 */2 * * *}
app.scheduler.b2b-overdue-check-cron=${APP_SCHEDULER_B2B_OVERDUE:0 0 9 * * *}
