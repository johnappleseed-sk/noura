version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: noura
      POSTGRES_USER: noura
      POSTGRES_PASSWORD: noura
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U noura -d noura"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    profiles: ["eventing"]
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    profiles: ["eventing"]
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.1
    profiles: ["search"]
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elastic_data:/usr/share/elasticsearch/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      SERVER_PORT: 8080
      DB_URL: jdbc:postgresql://postgres:5432/noura
      DB_USERNAME: noura
      DB_PASSWORD: noura
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SPRING_PROFILES_ACTIVE: local
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set and contain at least 32 characters}
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:8081
      KAFKA_ENABLED: "false"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      ELASTIC_ENABLED: "false"
      ELASTICSEARCH_URIS: http://elasticsearch:9200
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8080/api/v1
    depends_on:
      - backend
    ports:
      - "8081:80"

  admin:
    build:
      context: ./frontend/admin
    depends_on:
      - backend
    environment:
      VITE_PROXY_TARGET: http://backend:8080
    ports:
      - "5173:5173"

  storefront:
    build:
      context: ./frontend/storefront
    depends_on:
      - backend
    environment:
      API_BASE_URL: http://backend:8080
    ports:
      - "3000:3000"

  bridge:
    build:
      context: ./bridge/hardware-bridge
    depends_on:
      - backend
    ports:
      - "3100:3100"

volumes:
  postgres_data:
  redis_data:
  elastic_data:
